version: "3.9"

services:
  ml-api:               
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env                
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - ml-api         
    env_file:
      - .env
    restart: unless-stopped